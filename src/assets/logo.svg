<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" role="img" aria-label="Apna Ghar Jankari logo">
  <defs>
    <style>
      .logo-house { fill: #ffffff; }
      .logo-accent { fill: #ff8c00; }
      .logo-text-primary { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700; fill: #ffffff; }
      .logo-text-secondary { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 600; fill: #ff8c00; }
    </style>
  </defs>
  
  <!-- House icon -->
  <path class="logo-house" d="M 8 32 L 8 18 L 24 6 L 40 18 L 40 32 Z" stroke="none"/>
  <rect class="logo-house" x="16" y="20" width="8" height="8" rx="1"/>
  <rect class="logo-accent" x="24" y="26" width="4" height="6" rx="1"/>
  
  <!-- Text: Apna Ghar -->
  <text x="52" y="26" class="logo-text-primary">Apna Ghar</text>
  <!-- Text: Jankari.com -->
  <text x="52" y="44" class="logo-text-secondary">Jankari.com</text>
</svg>
